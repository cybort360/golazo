name: Live score refresh

# Keeps the live-score snapshot fresh even when nobody's on the site, so a match
# that finishes during quiet hours still gets recorded (Hobby Vercel Cron only
# fires once a day, too coarse for this). GitHub's scheduler is best-effort and
# can lag a few minutes under load — fine, since a final result doesn't change
# once it's in.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # manual trigger, e.g. a one-off backfill

# Don't pile up runs if one lags; the latest scoreboard is all that matters.
concurrency:
  group: live-refresh
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the refresh endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "https://golazo.fans/api/cron/live" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -w '\nHTTP %{http_code}\n'
